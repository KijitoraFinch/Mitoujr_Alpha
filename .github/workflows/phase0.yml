name: phase0

on:
  push:
  pull_request:

jobs:
  phase0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install jsonschema
      - run: opam install . --deps-only --with-test
        working-directory: sugar
      - run: make check
